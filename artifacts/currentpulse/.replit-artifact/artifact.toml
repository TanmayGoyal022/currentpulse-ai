kind = "web"
previewPath = "/"
title = "CurrentPulse AI"
version = "1.0.0"
id = "artifacts/currentpulse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18089

[services.development]
run = "pnpm --filter @workspace/currentpulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/currentpulse", "run", "build" ]
publicDir = "artifacts/currentpulse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18089"
BASE_PATH = "/"

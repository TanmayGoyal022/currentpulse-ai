kind = "mobile"
previewPath = "/mobile/"
title = "CurrentPulse Mobile"
version = "1.0.0"
id = "artifacts/currentpulse-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22982

[services.development]
run = "pnpm --filter @workspace/currentpulse-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/currentpulse-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/currentpulse-mobile", "run", "serve" ]

[services.env]
PORT = "22982"
BASE_PATH = "/mobile/"
